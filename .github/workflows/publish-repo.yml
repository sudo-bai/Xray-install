name: Publish APT Repository

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *' # 每天检查一次更新

env:
  # 推荐：同时支持通用代号 (stable) 和主流发行版代号
  # 这样用户既可以用 stable，也可以用系统自带的代号 (如 jammy, bookworm)
  CODENAMES: "stable main buster bullseye bookworm focal jammy noble"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: public
        continue-on-error: true

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y reprepro dpkg-dev gnupg-agent

      - name: Import GPG Key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "Error: GPG_PRIVATE_KEY secret is missing."
            exit 1
          fi
          
          # 0. 清理环境
          killall gpg-agent || true
          rm -rf ~/.gnupg

          # 1. 设置权限和配置
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "use-agent" > ~/.gnupg/gpg.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "no-tty" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          
          # 2. 导入私钥
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import

          # 3. 设置绝对信任
          KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep sec | tail -n 1 | awk '{print $2}' | awk -F'/' '{print $2}')
          if [ -z "$KEY_ID" ]; then
             echo "CRITICAL ERROR: No secret key found after import."
             exit 1
          fi
          echo -e "5\ny\n" | gpg --command-fd 0 --edit-key "$KEY_ID" trust

          # 4. 导出 Key ID 供后续步骤使用
          echo "GPG_KEY_ID=$KEY_ID" >> $GITHUB_ENV
          echo "Using Key ID: $KEY_ID"

      - name: Get Latest Xray Version
        id: get_version
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/XTLS/Xray-core/releases/latest | jq -r .tag_name)
          CLEAN_VERSION=${LATEST_VERSION#v}
          echo "version=${CLEAN_VERSION}" >> $GITHUB_OUTPUT
          echo "Found version: ${CLEAN_VERSION}"

      - name: Setup Reprepro Config
        run: |
          mkdir -p public/conf
          
          # 注意：这里我们移除了 'SignWith' 字段
          # 我们将在后续步骤中使用 gpg 命令行手动签名，以绕过 reprepro 的 GPGME 错误
          
          rm -f public/conf/distributions
          
          for CODE in $CODENAMES; do
            cat >> public/conf/distributions <<EOF
          Origin: Xray-install
          Label: Xray-install
          Codename: $CODE
          Architectures: amd64 arm64
          Components: main
          Description: Unofficial Xray APT Repository ($CODE)
          
          EOF
          done

      - name: Check if version exists in repo (stable)
        id: check_repo
        run: |
          if [ -d "public/dists/stable" ]; then
            if reprepro -b public list stable xray | grep -q "${{ steps.get_version.outputs.version }}"; then
              echo "Version ${{ steps.get_version.outputs.version }} already exists in repo."
              echo "exists=true" >> $GITHUB_OUTPUT
            else
              echo "exists=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and Add Packages
        if: steps.check_repo.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          mkdir -p build_output
          chmod +x scripts/build-deb.sh
          
          # 构建包
          ./scripts/build-deb.sh $VERSION amd64 build_output
          ./scripts/build-deb.sh $VERSION arm64 build_output
          
          # 添加到 Reprepro (此处 reprepro 仅生成索引，不签名)
          for deb in build_output/*.deb; do
            for CODE in $CODENAMES; do
              echo "Adding $deb to $CODE..."
              reprepro --basedir public includedeb $CODE $deb
            done
          done

      - name: Sign Release Files (Manual)
        if: steps.check_repo.outputs.exists == 'false'
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          export GPG_TTY=$(tty)
          
          for CODE in $CODENAMES; do
            DIST_DIR="public/dists/$CODE"
            echo "Signing Release file for $CODE..."
            
            if [ ! -f "$DIST_DIR/Release" ]; then
              echo "Warning: No Release file found for $CODE, skipping..."
              continue
            fi
            
            # 清理旧签名
            rm -f "$DIST_DIR/Release.gpg" "$DIST_DIR/InRelease"
            
            # 准备 GPG 参数
            # 即使没有密码，loopback 也是安全的 CI 默认配置
            GPG_ARGS="--batch --yes --pinentry-mode loopback"
            
            # 如果配置了密码，则传递给 GPG
            if [ -n "$GPG_PASSPHRASE" ]; then
               GPG_ARGS="$GPG_ARGS --passphrase $GPG_PASSPHRASE"
            fi
            
            # 1. 生成 Release.gpg (分离签名)
            gpg $GPG_ARGS --local-user "$GPG_KEY_ID" --detach-sign --armor --output "$DIST_DIR/Release.gpg" "$DIST_DIR/Release"
            
            # 2. 生成 InRelease (内嵌签名)
            gpg $GPG_ARGS --local-user "$GPG_KEY_ID" --clearsign --output "$DIST_DIR/InRelease" "$DIST_DIR/Release"
          done

      - name: Export Public Key
        if: steps.check_repo.outputs.exists == 'false'
        run: |
          gpg --armor --export "$GPG_KEY_ID" > public/public.key

      - name: Deploy to GitHub Pages
        if: steps.check_repo.outputs.exists == 'false'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: false
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'