name: Publish APT Repository

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *' # 每天检查一次更新

env:
  # 推荐：同时支持通用代号 (stable) 和主流发行版代号
  # 这样用户既可以用 stable，也可以用系统自带的代号 (如 jammy, bookworm)
  CODENAMES: "stable main buster bullseye bookworm focal jammy noble"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: public
        continue-on-error: true

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y reprepro dpkg-dev gnupg-agent

      - name: Import GPG Key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "Error: GPG_PRIVATE_KEY secret is missing."
            exit 1
          fi
          
          # 0. 清理环境，防止残留
          killall gpg-agent || true
          rm -rf ~/.gnupg

          # 1. 设置正确的目录权限 (GPG 对此非常敏感)
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg

          # 2. 配置 GPG 代理以支持无交互模式 (Loopback)
          echo "use-agent" > ~/.gnupg/gpg.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "no-tty" >> ~/.gnupg/gpg.conf
          
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          
          # 3. 导入私钥
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import

          # 4. 设置信任级别为绝对信任 (Ultimate) - 关键步骤
          # 获取 Key ID
          KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep sec | tail -n 1 | awk '{print $2}' | awk -F'/' '{print $2}')
          
          if [ -z "$KEY_ID" ]; then
             echo "CRITICAL ERROR: No secret key found after import."
             exit 1
          fi
          
          echo "Setting trust for Key ID: $KEY_ID"
          # 5 表示 Ultimate trust, y 确认
          echo -e "5\ny\n" | gpg --command-fd 0 --edit-key "$KEY_ID" trust

          # 5. 重启代理以应用配置
          gpg-connect-agent reloadagent /bye

          # 6. 设置全局环境变量 GPG_TTY
          echo "GPG_TTY=$(tty)" >> $GITHUB_ENV

      - name: Get Latest Xray Version
        id: get_version
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/XTLS/Xray-core/releases/latest | jq -r .tag_name)
          # 去掉 v 前缀
          CLEAN_VERSION=${LATEST_VERSION#v}
          echo "version=${CLEAN_VERSION}" >> $GITHUB_OUTPUT
          echo "Found version: ${CLEAN_VERSION}"

      - name: Setup Reprepro Config
        run: |
          mkdir -p public/conf
          
          # 获取 Key ID (使用 list-secret-keys 确保获取的是我们刚导入的私钥ID)
          KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep sec | tail -n 1 | awk '{print $2}' | awk -F'/' '{print $2}')
          
          echo "Using Key ID: $KEY_ID"
          
          # 每次运行时重置 distributions 文件，确保包含所有在 CODENAMES 中的代号
          rm -f public/conf/distributions
          
          for CODE in $CODENAMES; do
            cat >> public/conf/distributions <<EOF
          Origin: Xray-install
          Label: Xray-install
          Codename: $CODE
          Architectures: amd64 arm64
          Components: main
          Description: Unofficial Xray APT Repository ($CODE)
          SignWith: $KEY_ID
          
          EOF
          done

      - name: Check if version exists in repo (stable)
        id: check_repo
        run: |
          # 显式导出 TTY
          export GPG_TTY=$(tty)
          
          # 只需要检查 stable 是否存在即可，因为我们总是全量更新
          if [ -d "public/dists/stable" ]; then
            if reprepro -b public list stable xray | grep -q "${{ steps.get_version.outputs.version }}"; then
              echo "Version ${{ steps.get_version.outputs.version }} already exists in repo."
              echo "exists=true" >> $GITHUB_OUTPUT
            else
              echo "exists=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and Add Packages
        if: steps.check_repo.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          mkdir -p build_output
          chmod +x scripts/build-deb.sh
          
          # 再次确保 GPG_TTY 在当前 shell 生效 (reprepro 签名需要)
          export GPG_TTY=$(tty)
          
          # 构建 AMD64
          ./scripts/build-deb.sh $VERSION amd64 build_output
          # 构建 ARM64
          ./scripts/build-deb.sh $VERSION arm64 build_output
          
          # 添加到 Reprepro (仓库)
          for deb in build_output/*.deb; do
            for CODE in $CODENAMES; do
              echo "Adding $deb to $CODE..."
              # --export=force 确保尝试签名
              reprepro --basedir public --export=force includedeb $CODE $deb
            done
          done

      - name: Export Public Key
        if: steps.check_repo.outputs.exists == 'false'
        run: |
          export GPG_TTY=$(tty)
          gpg --armor --export > public/public.key

      - name: Deploy to GitHub Pages
        if: steps.check_repo.outputs.exists == 'false'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: false
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'